{% set name = "ansimarkup" %}
{% set version = "2.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 69ce2b9521bcea28b2a487e02abe3ce524578dc5f84235ffc15b53462c2e1188

build:
  number: 0
  noarch: python
  script: '{{ PYTHON }} -m pip install . --no-deps --ignore-installed -vv '

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools >=61.0
  run:
    - colorama
    - python >={{ python_min }}

test:
  requires:
    - python {{ python_min }}
  imports:
    - ansimarkup

about:
  home: https://github.com/gvalkov/python-ansimarkup
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.txt
  summary: Produce colored terminal text with an xml-like markup

extra:
  recipe-maintainers:
    - mariusvniekerk
